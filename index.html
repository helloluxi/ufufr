<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./favicon.svg" type="image/x-icon">
    <title>3BLD</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #2c2c2c;
            color: #E0E0E0;
        }
        .title {
            text-align: center;
            margin-top: 40px;
            font-size: 2em;
        }
        .canvas {
            display: flex;
            justify-content: center;
            flex-grow: 1;
            align-items: center;
        }
        .bottom {
            display: flex;
            justify-content: space-between;
            margin: 20px;
        }
        .command-input, .text-output {
            width: 49%;
        }
        .command-input input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background-color: #333;
            color: #E0E0E0;
            border: 1px solid #444;
        }
        .command-input input::placeholder {
            color: #888;
        }
        .text-output div {
            padding: 10px;
            box-sizing: border-box;
            background-color: transparent;
            color: #E0E0E0;
            border: none;
        }
        .toggle-btn {
            background-color: #333;
            color: #E0E0E0;
            border: 1px solid #444;
            padding: 10px;
            margin: 5px 5px;
            cursor: pointer;
            position: relative;
        }
        .toggle-btn.active {
            background-color: #ff8c00;
            border: 1px solid #ffa500;
        }
        .hover-text {
            position: absolute;
            text-align: left;
            top: 100%;
            left: 0;
            width: max-content;
            max-width: 250px;
            background-color: #333;
            color: #f0f0f0;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 8px;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: none;
        }

        .toggle-btn:hover .hover-text {
            display: block;
        }
        #nextButton {
            background-color: #333;
            color: #E0E0E0;
            border: 1px solid #444;
            padding: 10px;
            margin: 20px;
            cursor: pointer;
        }
        #menu-icon div {
            width: 25px;
            height: 3px;
            background-color: #fff;
            margin: 5px 0;
            transition: 0.3s;
        }
        #menu-icon {
            position: fixed;
            top: 20px;
            left: 20px;
            cursor: pointer;
            z-index: 1000;
        }
        #settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 500px;
            background-color: rgba(30,30,30,0.95);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            padding: 30px;
            z-index: 2000;
        }
        #settings-content {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 5px;
        }
        #settings-content::-webkit-scrollbar {
            width: 8px;
        }
        #settings-content::-webkit-scrollbar-thumb {
            background-color: #555;
            border-radius: 4px;
        }
        #settings-content::-webkit-scrollbar-thumb:hover {
            background-color: #777;
        }
        .setting {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .setting label {
            color: #e0e0e0;
        }
        .setting input[type="checkbox"] {
            appearance: none;
            width: 20px;
            height: 20px;
            background-color: #333;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }
        .setting input[type="checkbox"]:checked {
            background-color: #4CAF50;
        }
        .setting input[type="checkbox"]:checked::after {
            content: '✔';
            color: #fff;
            font-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .setting input[type="range"] {
            width: 150px;
            accent-color: #4CAF50;
        }
        .setting select {
            width: 150px;
            padding: 5px;
            border-radius: 5px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
        }
        .slider-value {
            width: 40px;
            text-align: right;
        }
        #back-button {
            position: relative;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        #back-button:hover {
            background-color: #444;
        }
        #timer-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #2c2c2c;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            cursor: pointer;
        }
        
        #timer-display {
            font-size: 12em;
            font-weight: bold;
            color: #E0E0E0;
            font-family: 'Courier New', Courier, monospace;
        }

        * {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        #server-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 250px;
            background-color: rgba(30,30,30,0.95);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            padding: 30px;
            z-index: 2000;
        }
        .server-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
            background-color: #333;
            color: #E0E0E0;
            border: 1px solid #444;
            border-radius: 5px;
        }

    </style>
</head>
<body>
    <div class="title" ondblclick="toggleSettingsPanel()">Generating Scramble...</div>
    <div id="settings-panel">
        <div id="settings-content">
            <div class="setting">
                <label>Mode</label>
                <select id="mode-select" onchange="saveSettings(true)">
                    <option value="rc">Random + Corner</option>
                    <option value="ec">Edge + Corner</option>
                    <option value="e">Edge</option>
                    <option value="c">Corner</option>
                    <option value="r">Random</option>
                    <option value="w">WCA</option>
                </select>
            </div>
            <div class="setting">
                <label>Parity</label>
                <input type="checkbox" id="parity-ckbx" onchange="saveSettings(true)" />
            </div>
            <div class="setting">
                <label>Timer</label>
                <input type="checkbox" id="timer-ckbx" checked onchange="saveSettings()" />
            </div>
            <div class="setting">
                <label>Mark +4</label>
                <input type="checkbox" id="mm-ckbx" checked onchange="saveSettings()" />
            </div>
            <div class="setting">
                <label style="width: 200px;">Learning Rate</label>
                <input type="range" min="0.01" max="1" value="0.1" step="0.03" id="lr-slider" onchange="saveSettings()" oninput="document.getElementById('lr-value').innerText = this.value" />
                <span id="lr-value" class="slider-value">0.1</span>

            <div class="setting">
                <label style="width: 200px;">Fall Off Rate</label>
                <input type="range" min="0.1" max="2" value="1" step="0.1" id="ff-slider" onchange="saveSettings()" oninput="document.getElementById('ff-value').innerText = this.value" />
                <span id="ff-value" class="slider-value">1</span>
            </div>
            <div class="setting">
                <label style="width: 200px;">Flip/Twist</label>
                <input type="range" min="0" max="1" value="0" step="0.1" id="ft-slider" onchange="saveSettings()" oninput="document.getElementById('ft-value').innerText = this.value" />
                <span id="ft-value" class="slider-value">0</span>

            <div class="setting">
                <label style="width: 200px;">3-Twist</label>

                <span id="ft2-value" class="slider-value">0</span>
            </div>
            <div class="setting">
                <label style="width: 200px;">Float</label>
                <input type="range" min="0" max="1" value="0" step="0.1" id="fl-slider" onchange="saveSettings()" oninput="document.getElementById('fl-value').innerText = this.value" />
                <span id="fl-value" class="slider-value">0</span>
            </div>
            <div id="tiny-line" style="text-align: center; color: #E0E0E0; font-size: 0.8em; margin: 10px 0;"></div>
        </div>
        <button id="back-button" onclick="toggleServerPanel()">Server</button>
        <button id="back-button" onclick="toggleSettingsPanel()">Back</button>
    </div>
    <div class="canvas" id="canvas">
        <div id="rubiksCubeContainer"></div>
    </div>
    <div class="button-row" style="text-align: center; margin-bottom: 10px;">
        <button id="nextButton">Next &rarr;</button>
    </div>
    <div class="bottom">
        <div class="command-input">
            <input type="text" id="command-input" placeholder="Enter command...">
        </div>
        <div class="text-output">
            <div id="command-output">Command output...</div>
        </div>
    </div>
    
    <div id="timer-container">
        <div id="timer-display">0.00</div>
    </div>

    <div id="server-panel">
        <input type="text" id="server-url" class="server-input" placeholder="Server URL">
        <input type="password" id="server-password" class="server-input" placeholder="Password">
        <div class="setting">
            <label>No Push</label>
            <input type="checkbox" id="no-push" onchange="saveSettings()">
        </div>
        <button id="back-button" onclick="saveServerSettings()">Save</button>
        <button id="back-button" onclick="toggleServerPanel()">Close</button>
    </div>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
            .then((registration) => {
                console.log('ServiceWorker registered with scope:', registration.scope);
            })
            .catch((error) => {
                console.error('ServiceWorker registration failed:', error);
            });
    });
}
</script>
<script src="min2phase.js"></script>
<script>

function forceUpdate() {
    if (navigator.serviceWorker.controller){
        navigator.serviceWorker.controller.postMessage('ud');
    } else if (print) {
        print('Service worker not ready.');
    }
    setTimeout(() => {
        location.reload();
    }, 1000);
}

const colorMapping = {
    'd': '#FFFFFF', // White
    'u': '#FFFF00', // Yellow
    'f': '#FF0000', // Red
    'b': '#FFA500', // Orange
    'l': '#0000FF', // Blue
    'r': '#00FF00'  // Green
};

const size = 40;
const faceSize = 3 * size + 10;

const svgNS = "http://www.w3.org/2000/svg";
const svg = document.createElementNS(svgNS, "svg");
svg.setAttribute("width", faceSize * 4);
svg.setAttribute("height", faceSize * 3);
svg.setAttribute("viewBox", `0 0 ${faceSize * 4} ${faceSize * 3}`);

const pieces = [];
function drawFace(xx, yy) {
    startX = xx * faceSize;
    startY = yy * faceSize;
    for (let i = 0; i < 9; i++) {
        const x = startX + (i % 3) * size;
        const y = startY + Math.floor(i / 3) * size;

        const rect = document.createElementNS(svgNS, "rect");
        rect.setAttribute("x", x);
        rect.setAttribute("y", y);
        rect.setAttribute("width", size);
        rect.setAttribute("height", size);
        rect.setAttribute("stroke", "#000000");

        pieces.push(rect);
        svg.appendChild(rect);
    }
}
drawFace(1, 0);
drawFace(2, 1);
drawFace(1, 1);
drawFace(1, 2);
drawFace(0, 1);
drawFace(3, 1);

document.getElementById('rubiksCubeContainer').appendChild(svg);

function updatePieceColors(str) {
    for (let i = 0; i < str.length; i++) {
        pieces[i].setAttribute("fill", colorMapping[str[i]]);
    }
}

function resizeCanvas() {
    let s = Math.min(window.innerWidth / 4 - 20, faceSize) / faceSize;
    svg.style.transform = `scale(${s})`;            
}

window.addEventListener('resize', resizeCanvas);
window.addEventListener('load', resizeCanvas);

const edgeIdxOnCube = [7, 19, 3, 37, 1, 46, 5, 10, 28, 25, 30, 43, 34, 52, 32, 16, 23, 12, 21, 41, 50, 39, 48, 14],
    cornIdxOnCube = [8, 9, 20, 6, 18, 38, 0, 36, 47, 2, 45, 11, 27, 44, 24, 33, 53, 42, 35, 17, 51, 29, 26, 15],
    edgeCode = 'ABCDEFGHIJKLMNOPQRSTWXYZ', cornCode = 'ahqcbtedwgfzilsknxmpyojr';
const edgeIdx = {}, cornIdx = {}, fullIdx = {};
for (let i = 0; i < 24; i++) {
    fullIdx[edgeCode[i]] = edgeIdx[edgeCode[i]] = i>>1;
    fullIdx[cornCode[i]] = (cornIdx[cornCode[i]] = (i/3)|0) + 12;
}

function swap(arr, i, j){
    let temp = arr[i];
    arr[i] = arr[j];
    arr[j] = temp;
}

function print(str){
    document.querySelector('.text-output div').innerText = str;
}

function printAdd(str){
    document.querySelector('.text-output div').innerText += str;
}

function isUpperCase(c){
    return c >= 'A' && c <= 'Z';
}

function cycleCube(cubeArr, code){
    if (isUpperCase(code)) {
        let i = edgeCode.indexOf(code);
        swap(cubeArr, edgeIdxOnCube[0], edgeIdxOnCube[i]);
        swap(cubeArr, edgeIdxOnCube[1], edgeIdxOnCube[i^1]);
    } else if (code > 'a' && code <= 'z') {
        let i = cornCode.indexOf(code);
        swap(cubeArr, cornIdxOnCube[0], cornIdxOnCube[i]);
        swap(cubeArr, cornIdxOnCube[1], cornIdxOnCube[((i/3)|0)*3+(i+1)%3]);
        swap(cubeArr, cornIdxOnCube[2], cornIdxOnCube[((i/3)|0)*3+(i+2)%3]);
    } else if (code > '0' && code < '6') {
        let i = parseInt(code);
        swap(cubeArr, 4+9*buffer, 4+9*i);
    }
}

function invCycleCube(cube, bfCode){
    let cubeArr = cube.split('');
    bfCode.split('').reverse().forEach(c => {
        cycleCube(cubeArr, c);
    });
    return cubeArr.join('');
}

function genCube(bfCode){
    let cubeArr = 'uuuuuuuuurrrrrrrrrfffffffffdddddddddlllllllllbbbbbbbbb'.split('');
    for (let bfCodeIdx = bfCode.length - 1; bfCodeIdx >= 0; bfCodeIdx--) {
        let c = bfCode[bfCodeIdx];
        if (c == '+' || c == '-') {
            const c1 = bfCode[--bfCodeIdx];
            if (isUpperCase(c1)) {
                cycleCube(cubeArr, edgeCode[edgeIdx[c1]*2+1]);
                cycleCube(cubeArr, c1);
            } else if (c == '+') {
                cycleCube(cubeArr, cornCode[cornIdx[c1]*3+1]);
                cycleCube(cubeArr, c1);
            } else {
            cycleCube(cubeArr, cornCode[cornIdx[c1]*3+2]);
            cycleCube(cubeArr, c1);
            }
        } else{
            cycleCube(cubeArr, c);
        }
    }
    return cubeArr.join('');
}

// Blank Stats
let stats = {}, mm = parseInt(localStorage.getItem('bld.moreMark')) == 'true' ? 4 : 0;
function initStat(key, cat) {
    stats[key] = {times: 0, mark: 0, more: Math.random()<0.04?mm:0, cat: cat};
}
for (let c1 of edgeCode.slice(2)) {
    for (let c2 of edgeCode.slice(2)) {
        if (edgeIdx[c1] != edgeIdx[c2]) {
            initStat(c1 + c2, 'e');
        }
    }
    for (let c2 of cornCode.slice(3)) {
        initStat(c1 + c2, 'par');
    }
    if (edgeCode[edgeIdx[c1]*2] == c1){
        initStat(c1 + '+', 'e+');
    }
}
for (let c1 of cornCode.slice(3)) {
    for (let c2 of cornCode.slice(3)) {
        if (cornIdx[c1] != cornIdx[c2]) {
            initStat(c1 + c2, 'c');
        }
    }
}
for (let cIdx1 = 3; cIdx1 < 24; cIdx1 += 3) {
    const c1 = cornCode[cIdx1];
    initStat(`${c1}+`, 'c+');
    initStat(`${c1}-`, 'c+');
    for (let cIdx2 = cIdx1 + 3; cIdx2 < 24; cIdx2 += 3) {
        const c2 = cornCode[cIdx2];
        initStat(`${c1}+${c2}+`, 'c++');
        initStat(`${c1}-${c2}-`, 'c++');
    }
}

// Server
let serverUrl = localStorage.getItem('bld.serverUrl') || '', serverPassword = localStorage.getItem('bld.serverPswd') || '', noPush = localStorage.getItem('bld.noPush') === 'true';
function saveServerSettings() {
    let _serverUrl = document.getElementById('server-url').value;
    let _serverPassword = document.getElementById('server-password').value;
    noPush = document.getElementById('no-push').checked;
    if (!_serverUrl || !_serverPassword) return;

    fetch(`${_serverUrl}`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            file: 'test',
            text: '',
            pswd: _serverPassword
        })
    }).then(response => {
        if (response.ok) {
            serverUrl = _serverUrl;
            serverPassword = _serverPassword;
            localStorage.setItem('bld.serverUrl', serverUrl);
            localStorage.setItem('bld.serverPswd', serverPassword);
            localStorage.setItem('bld.noPush', noPush);
            getServer(true);
            toggleServerPanel();
            forceUpdate();
        } else {
            print(`Server connection failed: ${response.status} ${response.statusText}`);
        }
    }).catch(err => {
        console.error(`Error pushing stats: ${err}`);
    });
}

function toggleServerPanel() {
    if (document.getElementById('server-panel').style.display == 'flex') {
        document.getElementById('server-panel').style.display = 'none';
    }
    else {
        document.getElementById('settings-panel').style.display = 'none';
        const serverPanel = document.getElementById('server-panel');
        serverPanel.style.display = 'flex';
        
        document.getElementById('server-url').value = serverUrl;
        document.getElementById('server-password').value = serverPassword;
        document.getElementById('no-push').checked = noPush;
    }
}

// Mem & Mark
let algs = {};
let ecCode = [];
let learningRate = parseFloat(localStorage.getItem('bld.learningRate')) || 0.1;
let falloff = parseFloat(localStorage.getItem('bld.falloff')) || 1;
let timerEnabled = localStorage.getItem('bld.timer') != 'false';
let mode = localStorage.getItem('bld.mode') || 'rc';
let codeDict = {};
let markedAlgKeys = [];
function updateAlg(text) {
    text.split(/\r?\n/).forEach(line => {
        let eqIdx = line.indexOf('=');
        let key = line.substring(0, eqIdx).trim();
        let alg = line.substring(eqIdx+1).trim();
        algs[key] = alg;
        if (alg.endsWith('!')) markedAlgKeys.push(key);
    });
}
function updateMem(text) {
    text.split(/\r?\n/).forEach(line => {
        let eqIdx = line.indexOf('=');
        let key = line.substring(0, eqIdx).trim();
        codeDict[key] = line.substring(eqIdx+1).trim();
    });
}
function updateStats(text) {
    text.split(/\r?\n/).forEach(item => {
        if (item.trim().length == 0) return;
        const [key, value] = item.split('=');
        [stats[key].times, stats[key].mark] = value.split(',').map(Number);
    });
}
function getItem(key, func, forceServer=false) {
    let savedItem;
    if (!forceServer) {
        savedItem = localStorage.getItem(`bld.${key}`);
    }
    if (serverUrl && (!savedItem || forceServer)) {
        fetch(serverUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                file: key,
                text: '',
                pswd: serverPassword
            })
        })
        .then(response => response.text())
        .then(text => {
            savedItem = text;
            localStorage.setItem(`bld.${key}`, text);
            func(savedItem);
            console.log(`[Server] ${key}`);
        }).catch(err => {
            if (!savedItem) {
                savedItem = localStorage.getItem(`bld.${key}`);
                func(savedItem);
                console.log(`[Local] ${key}`);
            }
        });
    } else if (savedItem) {
        func(savedItem);
        console.log(`[Local] ${key}`);
    }
}
function getServer(forceServer=false) {
    if (!serverUrl){
        print('No server.');
    }
    getItem('alg', updateAlg, forceServer);
    getItem('mem', updateMem, forceServer);
    getItem('stats', updateStats, forceServer);
}

function isNonPro(key){
    return stats[key].cat == 'e' || stats[key].cat == 'c';
}

function sampleDict(dict, rd){
    for (let key in dict) {
        rd -= dict[key];
        if (rd < 0) {
            return key;
        }
    }
}

function getWeight(stat){
    return stat.times == 0 ? learningRate : Math.pow(stat.times, -2 / (1 + (stat.mark + stat.more) * falloff));
}

let occupied, usePar = localStorage.getItem('bld.par') != 'false', ft2Weight = localStorage.getItem('bld.ft2Weight') || 0, ftWeight = localStorage.getItem('bld.ftWeight') || 0, flWeight = localStorage.getItem('bld.flWeight') || 0;
function genCode(cat, maxCount, code){
    if (cat.endsWith('3')){
        let indices = [], ocStart = cat[0] == 'e' ? 0 : 12, ocCount = cat[0] == 'e' ? 12 : 8, gap = cat[0] == 'e' ? 2 : 3;
        let idxPool = [...Array(ocCount).keys()].filter(ocIdx => !occupied[ocIdx + ocStart]);
        for (let idx = 0; idx < 3; idx++) {
            let poolIdx = Math.random() * idxPool.length | 0;
            indices.push(idxPool[poolIdx]);
            occupied[idxPool[poolIdx] + ocStart] = true;
            idxPool.splice(poolIdx, 1);
        }
        indices.sort((a, b) => a - b);
        let codePool = cat[0] == 'e' ? edgeCode : cornCode;
        const codes = [codePool[indices[0]*gap], codePool[indices[1]*gap+(Math.random()*gap|0)], codePool[indices[2]*gap+(Math.random()*gap|0)]];
        code.push(`${codes[0]}${codes[1]}${codes[2]}${codes[0]}`);
    }
    else{
        let weights = {};
        let tmpAlgs = [];
        let sumWeight = 0.0;
        for (let key in stats) {
            if (stats[key].cat == cat){
                sumWeight += weights[key] = getWeight(stats[key]);
            }
        }
        for (let i = 0; i < maxCount; i++) {
            let keysToDel = Object.keys(weights).filter(key => key.split('').some(k => fullIdx[k] !== undefined && occupied[fullIdx[k]]));
            keysToDel.forEach(key => {
                sumWeight -= weights[key];
                delete weights[key];
            });
            if (Object.keys(weights).length == 0) break;
            let key = sampleDict(weights, Math.random() * sumWeight);
            tmpAlgs.push(key);
            key.split('').forEach(k => fullIdx[k] !== undefined && (occupied[fullIdx[k]] = true));
        }
        for (let i = 0; i < tmpAlgs.length; i++) {
            let j = Math.floor(Math.random() * (tmpAlgs.length - i));
            code.push(tmpAlgs[j]);
            tmpAlgs[j] = tmpAlgs[tmpAlgs.length - i - 1];
        }
    }
}

const eFaces = ['uf', 'ul', 'ub', 'ur', 'df', 'dl', 'db', 'dr', 'fr', 'fl', 'bl', 'br'];
let randPermParity = 0;
function randPerm(n) {
    randPermParity = 0;
    let arr = Array.from({length: n}, (_, i) => i);
    for (let i = n - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        if (i != j){
            [arr[i], arr[j]] = [arr[j], arr[i]];
            randPermParity ^= 1;
        }
    }
    return arr;
}

const bfSuffix1 = ['', ' Rw', ' Rw2', ' Rw\'', ' Fw', ' Fw\''], bfSuffix2 = ['', ' Uw', ' Uw2', ' Uw\''];
const sufCode1 = ['', 'JMFGQOYGjmf235', 'MFJFGOGYQYmfjf3252', 'FMJGYOQGfmj532', 'TIRGDKPGtir431', 'RITGPKDGrit134'],
    sufCode2 = ['', 'GECQZWTQgec15421', 'EGCGQWQZTZegcg141252', 'CEGQTWZQceg12451'];
const wcaOriMap = { 'u': 'd', 'd': 'u', 'r': 'f', 'f': 'r', 'l': 'b', 'b': 'l' };
let congrated = localStorage.getItem('bld.congrates') == '1';
let scrText = '';
function newScramble(){
    ecCode = [];
    let cube;
    if (mode == 'r' || mode == 'w'){
        cube = min2phase.randomCube().toLowerCase();
    }
    else{
        let randE = mode == "rc";
        let scrambleE = mode == 'ec' || mode == 'e' || mode == 'rc';
        let scrambleC = mode == 'ec' || mode == 'c' || mode == 'rc';
        occupied = Array(20).fill(false);
        occupied[0] = occupied[12] = true;
        let sf = [];
        let hasPar = 0;
        if (usePar && scrambleE && scrambleC && Math.random() < 0.5){
            hasPar = 1;
            genCode('par', 1, sf);
        }
        if (scrambleE && !randE){
            let sfE = [];
            if (Math.random() < ftWeight){
                genCode('e+', 1, sfE);
            }
            if (Math.random() < flWeight){
                genCode('e3', 1, sfE);
            }
            genCode('e', 999, ecCode);
            ecCode.push(...sfE);
        }
        if (scrambleC){
            let sfC = [];
            if (Math.random() < flWeight){
                genCode('c3', 1, sfC);
            }
            if (Math.random() < ft2Weight){
                genCode('c++', 1, sf);
            } else if (Math.random() < ftWeight){
                genCode('c+', 1, sf);
            }
            genCode('c', 999, ecCode);
            ecCode.push(...sfC);
        }
        ecCode.push(...sf);
        cube = genCube(ecCode.join(''));
        if (randE) {
            let eoSum = 0, ep = randPerm(12), eo = Array.from({length: 12}, (_, i) => { const o = Math.random() * 2 | 0; eoSum ^= o; return o; });
            eo[0] ^= eoSum;
            let cubeArr = cube.split('');
            for (let i = 0; i < 12; i++) {
                cubeArr[edgeIdxOnCube[i*2]] = eFaces[ep[i]][eo[i]];
                cubeArr[edgeIdxOnCube[i*2+1]] = eFaces[ep[i]][eo[i]^1];
            }
            if (randPermParity != hasPar) {
                swap(cubeArr, edgeIdxOnCube[0], edgeIdxOnCube[6]);
                swap(cubeArr, edgeIdxOnCube[1], edgeIdxOnCube[7]);
            }
            cube = cubeArr.join('');
            if (hasPar) { // Remove parity code
                ecCode.splice(ecCode.length - sf.length, 1);
            }
        }
        // console.log(`[Cube] ${cube}`);
        const numToLearn = Object.keys(stats).filter(key => isNonPro(key) && stats[key].times == 0).length;
        if (numToLearn == 0 && !congrated){
            alert('Congratulations, you have learned all 818 algs!');
            congrated = true;
            localStorage.setItem('bld.congrates', '1');
            return;
        }
    }
    scrText = min2phase.scramble(cube);
    if (mode == 'w'){
        // Maybe not the same as WCA scramble, but still a uniformly random state
        const randSuffix1 = Math.random() * 6 | 0, randSuffix2 = Math.random() * 4 | 0;
        scrText += bfSuffix1[randSuffix1] + bfSuffix2[randSuffix2];
        cube = invCycleCube(cube, sufCode2[randSuffix2] + sufCode1[randSuffix1]);
        // Map YuRf to WuGf
        cube = cube.split('').map(c => wcaOriMap[c] || c).join('');
    }
    updatePieceColors(cube);
    document.querySelector('.title').innerText = scrText;
    resetButtons();
}

const pushStats = (function() {
  let timeout;
  const delay = 300; // Delay in milliseconds
  
  return function(text) {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
        if (!serverUrl || noPush) return;
        fetch(`${serverUrl}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                file: 'save',
                text: text,
                pswd: serverPassword
            })
        }).catch(err => {
            console.error(`Error pushing stats: ${err}`);
        });
    }, delay);
  };
})();

function saveStats(){
    let statStr = Object.keys(stats).map(key => `${key}=${stats[key].times},${stats[key].mark}`).join('\n');
    localStorage.setItem('bld.stats', statStr);
}

function markTimesAndUpdateScramble(stat){
    event.preventDefault();
    let statToPush = [];
    ecCode.forEach(key => {
        let stat = stats[key];
        if (!stat) return;
        stat.times++;
        statToPush.push(`${key}=${stat.times},${stat.mark}`);
    });
    saveStats();
    pushStats(statToPush.join('\n'));
    newScramble();
}

function addMark(keys){
    let realKeys = [], statToPush = [];
    keys.forEach(key => {
        let stat = stats[key];
        if (!stat) return;
        stat.mark++;
        realKeys.push(key);
        statToPush.push(`${key}=${stat.times},${stat.mark}`);
    });
    if (realKeys.length > 0){
        print(`Add Mark: ${realKeys.map(key => `${key}(${stats[key].mark}/${stats[key].times})`).join(', ')}`);
        saveStats();
        pushStats(statToPush.join('\n'));
    }
}

function removeMark(keys){
    let realKeys = [], statsToPush = [];
    keys.forEach(key => {
        let stat = stats[key];
        if (!stat) return;
        stat.times = 0;
        stat.mark = 0;
        realKeys.push(key);
        statsToPush.push(`${key}=${stat.times},${stat.mark}`);
    });
    if (realKeys.length > 0){
        print(`Remove Mark: ${realKeys.map(key => `${key}(${stats[key].mark}/${stats[key].times})`).join(', ')}`);
        saveStats();
        pushStats(statsToPush.join('\n'));
    }
}

function getAlgInfo(key){
    const code = codeDict[key.toUpperCase()] || '*';
    const alg = algs[key] || '*';
    const output = [
        `${alg} (${code})`,
        `Total=${stats[key].times}`,
        `Mark=${stats[key].mark}` + (stats[key].more > 0 ? `(+${stats[key].more})` : ''),
        `Weight=${getWeight(stats[key]).toFixed(2)}`
    ];
    return output;
}

function toggleSettingsPanel() {
    const panel = document.getElementById('settings-panel');
    panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    if (panel.style.display === 'flex') {
        document.getElementById('mode-select').value = mode;
        document.getElementById('parity-ckbx').checked = usePar;
        document.getElementById('mm-ckbx').checked = mm > 0;
        document.getElementById('ft-slider').value = ftWeight;
        document.getElementById('ft2-slider').value = ft2Weight;
        document.getElementById('fl-slider').value = flWeight;
        document.getElementById('lr-slider').value = learningRate;
        document.getElementById('ff-slider').value = falloff;
        document.getElementById('ft-value').innerText = ftWeight;
        document.getElementById('ft2-value').innerText = ft2Weight;
        document.getElementById('fl-value').innerText = flWeight;
        document.getElementById('lr-value').innerText = learningRate;
        document.getElementById('ff-value').innerText = falloff;
        document.getElementById('timer-ckbx').checked = timerEnabled;
        
        let filtered = Object.keys(stats).filter(key => isNonPro(key) && stats[key].times > 0);
        let progress = filtered.length;
        let totalTimes = filtered.reduce((acc, key) => acc + stats[key].times, 0);
        let totalMarks = filtered.reduce((acc, key) => acc + stats[key].mark, 0);
        document.getElementById('tiny-line').innerText = `Progress=${progress}/818 (${(100 * progress / 818).toFixed(2)}%)
            Avg Times=${(totalTimes / progress).toFixed(2)}
            Avg Marks=${(totalMarks / progress).toFixed(2)}`;
    }
}

function saveSettings(genScr=false) {
    mode = document.getElementById('mode-select').value;
    timerEnabled = document.getElementById('timer-ckbx').checked;
    usePar = document.getElementById('parity-ckbx').checked;
    mm = document.getElementById('mm-ckbx').checked ? 4 : 0;
    ftWeight = parseFloat(document.getElementById('ft-slider').value);
    ft2Weight = parseFloat(document.getElementById('ft2-slider').value);
    flWeight = parseFloat(document.getElementById('fl-slider').value);
    learningRate = parseFloat(document.getElementById('lr-slider').value);
    falloff = parseFloat(document.getElementById('ff-slider').value);
    localStorage.setItem('bld.mode', mode);
    localStorage.setItem('bld.par', usePar);
    localStorage.setItem('bld.ftWeight', ftWeight);
    localStorage.setItem('bld.ft2Weight', ft2Weight);
    localStorage.setItem('bld.flWeight', flWeight);
    localStorage.setItem('bld.learningRate', learningRate);
    localStorage.setItem('bld.falloff', falloff);
    localStorage.setItem('bld.timer', timerEnabled);
    localStorage.setItem('bld.moreMark', mm > 0);
    if (genScr) newScramble();
}

const textInput = document.getElementsByClassName('command-input')[0].getElementsByTagName('input')[0];
let lastCmd = '';
document.addEventListener('keydown', function(event) {
    if (isTimerRunning) {
        event.preventDefault();
        stopTimer();
        return;
    }
    if (event.key === 'Escape') {
        if (document.getElementById('settings-panel').style.display == 'flex') {
            toggleSettingsPanel();
        }
        else if (document.getElementById('server-panel').style.display == 'flex') {
            toggleServerPanel();
        }
        else if (textInput.focus) {
            textInput.blur();
        }
        return;
    }
    if (event.key === '`') {
        toggleSettingsPanel();
        return;
    }
    if (document.getElementById('settings-panel').style.display == 'flex' || 
        document.getElementById('server-panel').style.display == 'flex') {
        return;
    }
    if (event.key === ' ' && textInput !== document.activeElement && timerEnabled) {
        event.preventDefault();
        startLongPress();
        return;
    }
    if (event.key === 'Tab') {
        event.preventDefault();
        markTimesAndUpdateScramble();
        return;
    }
    if (textInput !== document.activeElement) {
        textInput.focus();
    }
    if (event.key === 'ArrowUp') {
        event.preventDefault();
        textInput.value = lastCmd;
        textInput.focus();
        textInput.setSelectionRange(textInput.value.length, textInput.value.length);
    }
    if (event.key === 'Enter') {
        lastCmd = textInput.value.trim();
        let cmd = lastCmd.split(' ');
        textInput.value = '';
        svg.focus();
        if (cmd.length == 0) return;
        if (cmd[0][0] == '.') {
            let key = cmd[0].substring(1);
            if (stats[key]) {
                print(`${key}: ${getAlgInfo(key).join(', ')}`);
            } else if (algs[key]) {
                print(`${key}: ${algs[key]}`);
            } else if (codeDict[key.toUpperCase()]) {
                print(`${key}: ${codeDict[key.toUpperCase()]}`);
            } else {
                print('Key not found.');
            }
            return;
        }
        switch (cmd[0].toLowerCase()) {
            case '+':
                addMark(cmd.slice(1));
                break;    
            case '-':
                removeMark(cmd.slice(1));
                break;
            case 'alg':
                const randKey = markedAlgKeys[Math.floor(Math.random() * markedAlgKeys.length)];
                print(`${randKey}: ${algs[randKey]}`);
                break;
            case 'cp':
                navigator.clipboard.writeText(lastSolveInfo).then(() => {
                    print('Copied: ' + lastSolveInfo);
                }).catch(err => {
                    print('Failed to copy: ' + err);
                });
                break;
            case 'top':
                let numTop = cmd.length > 1? parseInt(cmd[1]) : 10;
                let topKeys = Object.keys(stats).filter(key => isNonPro(key))
                    .sort((a, b) => (stats[b].mark - stats[a].mark) || (stats[a].times - stats[b].times)).slice(0, numTop);
                print(`Top ${numTop} marks: ${topKeys.map(key => `${key}(${stats[key].mark}/${stats[key].times})`).join(', ')}`);
                break;
            case 'push':
                pushStats(localStorage.getItem('bld.stats'));
                break;
            case 'ud':
                getServer(true);
                forceUpdate();
                break;
            default:
                print(`Unknown command: ${cmd[0]}. Usage: ./+/-/alg/cp/top/ud`);
                break;
        }
    }
});

const buttonRow = document.querySelector('.button-row');
const newButton = document.createElement('button');
const nextButtonHtml = '<button id="nextButton" onclick="onClickNext()">Next &rarr;</button>';
function _showHoverText(event) {
    const hoverText = document.createElement('div');
    hoverText.className = 'hover-text';
    hoverText.innerHTML = getAlgInfo(event.target.textContent).join('<br>');
    event.target.appendChild(hoverText);
}
function _hideHoverText(event) {
    const hoverText = event.target.querySelector('.hover-text');
    if (hoverText) {
        event.target.removeChild(hoverText);
    }
}
function _genButton(text) {
    const button = document.createElement('button');
    button.textContent = text;
    button.className = 'toggle-btn';
    if (stats[text]) {
        button.onclick = function() { this.classList.toggle('active'); };
        button.addEventListener('mouseover', _showHoverText);
        button.addEventListener('mouseout', _hideHoverText);
    }
    return button;
}
function resetButtons() {
    buttonRow.innerHTML = '';
    ecCode.forEach(code => buttonRow.appendChild(_genButton(code)));
    buttonRow.appendChild(document.createElement('button')).outerHTML = nextButtonHtml;
}
function onClickNext() {
    const activeButtons = document.querySelectorAll('.toggle-btn.active');
    const activeButtonNames = Array.from(activeButtons).map(btn => btn.textContent);
    markTimesAndUpdateScramble();
    addMark(activeButtonNames);
}

const canvas = document.getElementById('canvas');
const timerContainer = document.getElementById('timer-container');
const timerDisplay = document.getElementById('timer-display');
const commandOutput = document.getElementById('command-output');
let timerInterval;
let startTime;
let longPressTimer;
let isTimerRunning = false;
let pressStarted = false;
let lastSolveInfo = '';
function formatTime(time) {
    const seconds = (time / 1000) | 0;
    const milliseconds = ((time % 1000) / 10) | 0;
    return `${seconds}.${milliseconds.toString().padStart(2, '0')}`;
}
function startTimer() {
    if (!timerEnabled) return;
    isTimerRunning = true;
    startTime = new Date().getTime();
    timerInterval = setInterval(() => {
        const currentTime = new Date().getTime() - startTime;
        timerDisplay.textContent = formatTime(currentTime);
    }, 37);
}
function stopTimer() {
    if (isTimerRunning){
        const now = new Date();
        const nowStr = now.toLocaleString('sv-SE').replace('T', ' ');
        const finalTime = now.getTime() - startTime;
        if (finalTime < 200) return;
        clearInterval(timerInterval);
        const finalTimeStr = formatTime(finalTime);
        commandOutput.textContent = `Time: ${finalTimeStr}`;
        lastSolveInfo = `${finalTimeStr}  ${scrText}  @${nowStr}`;
        isTimerRunning = false;
    }
    timerContainer.style.display = 'none';
}
function prepareTimer() {
    if (!timerEnabled) return;
    timerContainer.style.display = 'flex';
    timerDisplay.textContent = '0.00';
}
function startLongPress() {
    if (!timerEnabled) return false;
    pressStarted = true;
    longPressTimer = setTimeout(() => {
        prepareTimer();
    }, 500);
    return true;
}
function endPress() {
    if (pressStarted) {
        clearTimeout(longPressTimer);
        if (timerContainer.style.display === 'flex' && !isTimerRunning) {
            startTimer();
        }
        pressStarted = false;
    }
}
canvas.addEventListener('mousedown', () => startLongPress());
document.addEventListener('mouseup', () => endPress());
canvas.addEventListener('touchstart', () => startLongPress());
document.addEventListener('touchend', () => endPress());
document.addEventListener('touchcancel', () => {
    if (pressStarted) {
        clearTimeout(longPressTimer);
        pressStarted = false;
        stopTimer();
    }
});
timerContainer.addEventListener('mousedown', stopTimer);
timerContainer.addEventListener('touchstart', stopTimer);
document.addEventListener('keyup', (e) => {
    if (e.key === ' ' && textInput !== document.activeElement && timerEnabled && !isTimerRunning) {
        endPress();
    }
});
window.addEventListener('blur', () => {
    if (pressStarted) {
        clearTimeout(longPressTimer);
        pressStarted = false;
        stopTimer();
    }
});


document.addEventListener('DOMContentLoaded', () => {
    getServer();
    newScramble();
});

</script>
